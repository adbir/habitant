name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write Supabase config
        run: |
          cat > lib/core/supabase_config.dart << 'EOF'
          const supabaseUrl = '${{ secrets.SUPABASE_URL }}';
          const supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF

      - run: flutter pub get

      - run: flutter build web --release --base-href /habitant/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
